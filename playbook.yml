---
- name: Automasi Infrastruktur El-Maknyuso
  hosts: localhost
  connection: local
  become: yes

  tasks:
    # =======================================================
    # BAGIAN 1: VM-DATABASE (MySQL)
    # =======================================================
    - name: Setup VM Database
      block:
        - name: Install MySQL Server
          apt:
            name: mysql-server
            state: present
            update_cache: yes

        - name: Buka Akses Remote (Bind-Address)
          lineinfile:
            path: /etc/mysql/mysql.conf.d/mysqld.cnf
            regexp: '^bind-address'
            line: 'bind-address = 0.0.0.0'

        - name: Inisialisasi Database dan Tabel
          shell: |
            mysql -e "CREATE DATABASE IF NOT EXISTS db_maknyuso;"
            mysql -e "ALTER USER 'admin_resto'@'%' IDENTIFIED WITH mysql_native_password BY 'resto123' || CREATE USER 'admin_resto'@'%' IDENTIFIED BY 'resto123';"
            mysql -e "GRANT ALL PRIVILEGES ON db_maknyuso.* TO 'admin_resto'@'%';"
            mysql -e "USE db_maknyuso; CREATE TABLE IF NOT EXISTS pesanan (
              id INT AUTO_INCREMENT PRIMARY KEY,
              waktu TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              nama_pelanggan VARCHAR(100),
              menu VARCHAR(100),
              jumlah INT,
              total_harga DECIMAL(15, 2)
            );"
            mysql -e "FLUSH PRIVILEGES;"

        - name: Restart Service MySQL
          service:
            name: mysql
            state: restarted
      when: target_node == 'database'

    # =======================================================
    # BAGIAN 2: VM-BACKEND (Python Flask)
    # =======================================================
    - name: Setup VM Backend API
      block:
        - name: Install Python & Library MySQL
          apt:
            name: [python3-pip, python3-flask, python3-flask-cors, python3-mysqldb]
            state: present

        - name: Deploy Script app.py
          copy:
            dest: "/home/vagrant/app.py"
            content: |
              from flask import Flask, request, jsonify
              from flask_cors import CORS
              import MySQLdb
              import MySQLdb.cursors

              app = Flask(__name__)
              CORS(app) # Mengizinkan akses dari Frontend

              def get_db():
                  return MySQLdb.connect(host="192.168.56.21", user="admin_resto", passwd="resto123", db="db_maknyuso", cursorclass=MySQLdb.cursors.DictCursor)

              @app.route('/api/pesanan', methods=['POST'])
              def add_pesanan():
                  d = request.json
                  db = get_db()
                  cur = db.cursor()
                  cur.execute("INSERT INTO pesanan (nama_pelanggan, menu, jumlah, total_harga) VALUES (%s, %s, %s, %s)", 
                              (d['nama_pelanggan'], d['menu'], d['jumlah'], d['total_harga']))
                  db.commit()
                  db.close()
                  return jsonify({"status": "sukses"})

              @app.route('/api/pesanan', methods=['GET'])
              def get_pesanan():
                  db = get_db()
                  cur = db.cursor()
                  cur.execute("SELECT id, DATE_FORMAT(waktu, '%d/%m/%Y %H:%i') as waktu, nama_pelanggan, menu, jumlah, total_harga FROM pesanan ORDER BY id DESC")
                  res = cur.fetchall()
                  db.close()
                  return jsonify(res)

              if __name__ == '__main__':
                  app.run(host='0.0.0.0', port=5000)

        - name: Autostart API Flask (Systemd)
          copy:
            dest: "/etc/systemd/system/maknyuso.service"
            content: |
              [Unit]
              Description=Backend El-Maknyuso
              After=network.target
              [Service]
              User=vagrant
              WorkingDirectory=/home/vagrant
              ExecStart=/usr/bin/python3 /home/vagrant/app.py
              Restart=always
              [Install]
              WantedBy=multi-user.target

        - name: Jalankan Service Backend
          systemd:
            name: maknyuso
            state: restarted
            enabled: yes
            daemon_reload: yes
      when: target_node == 'backend'

   # =======================================================
    # BAGIAN 3: VM-FRONTEND (Nginx)
    # =======================================================
    - name: Setup VM Frontend
      block:
        - name: Install Nginx Web Server
          apt:
            name: nginx
            state: present

        - name: Deploy File HTML Kasir (UI/UX Modern + Fitur Keranjang)
          copy:
            dest: "/var/www/html/index.html"
            content: |
              <!DOCTYPE html>
              <html lang="id">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>Kasir El-Maknyuso</title>
                  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
                  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
                  <style>
                      body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
                      .navbar-brand { font-weight: 700; letter-spacing: 1px; }
                      .card { border: none; border-radius: 12px; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05); }
                      .card-header { background-color: #fff; border-bottom: 2px solid #f8f9fa; border-radius: 12px 12px 0 0 !important; }
                      .btn-primary { background-color: #dc3545; border-color: #dc3545; font-weight: 600; padding: 10px 20px; border-radius: 8px; transition: all 0.3s; }
                      .btn-primary:hover { background-color: #c82333; border-color: #bd2130; transform: translateY(-1px); box-shadow: 0 4px 6px rgba(220,53,69,0.2); }
                      .form-control, .form-select { border-radius: 8px; padding: 10px 15px; border: 1px solid #dee2e6; }
                      .table-hover tbody tr:hover { background-color: #fff3f4; transition: 0.2s; }
                      .form-label { font-weight: 600; color: #495057; }
                      .keranjang-item { font-size: 0.9rem; border-left: 3px solid #dc3545; }
                  </style>
              </head>
              <body>
                  <nav class="navbar navbar-expand-lg navbar-dark bg-danger mb-4 shadow-sm">
                      <div class="container">
                          <a class="navbar-brand" href="#"><i class="bi bi-shop me-2"></i>El-Maknyuso POS</a>
                          <span class="navbar-text text-light"><i class="bi bi-clock me-1"></i> <span id="clock"></span></span>
                      </div>
                  </nav>

                  <div class="container pb-5">
                      <div class="row g-4">
                          <div class="col-lg-4">
                              <div class="card h-100">
                                  <div class="card-header py-3">
                                      <h5 class="mb-0 text-danger fw-bold"><i class="bi bi-cart-plus me-2"></i>Order Baru</h5>
                                  </div>
                                  <div class="card-body p-4">
                                      <form id="formKasir">
                                          <div class="mb-3">
                                              <label class="form-label">Nama Pelanggan</label>
                                              <div class="input-group">
                                                  <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                                                  <input type="text" id="pelanggan" class="form-control" placeholder="Contoh: Budi" required>
                                              </div>
                                          </div>
                                          
                                          <div class="mb-3">
                                              <label class="form-label">Pilih Menu</label>
                                              <div class="input-group">
                                                  <span class="input-group-text bg-white"><i class="bi bi-cup-hot"></i></span>
                                                  <select id="menu" class="form-select">
                                                      <option value="" data-harga="0">-- Pilih Menu --</option>
                                                      <option value="Ayam Bakar" data-harga="25000">Ayam Bakar (Rp 25.000)</option>
                                                      <option value="Soto Daging" data-harga="30000">Soto Daging (Rp 30.000)</option>
                                                      <option value="Es Teh" data-harga="5000">Es Teh (Rp 5.000)</option>
                                                  </select>
                                              </div>
                                          </div>

                                          <div class="mb-4">
                                              <label class="form-label">Jumlah Porsi</label>
                                              <div class="input-group">
                                                  <span class="input-group-text bg-white"><i class="bi bi-123"></i></span>
                                                  <input type="number" id="jumlah" class="form-control" value="1" min="1">
                                                  <button type="button" class="btn btn-outline-danger" onclick="tambahKeKeranjang()">
                                                      <i class="bi bi-plus-lg"></i> Tambah
                                                  </button>
                                              </div>
                                          </div>

                                          <div id="keranjang-area" class="mb-3"></div>

                                          <div class="p-3 bg-light rounded-3 mb-4 border">
                                              <label class="form-label text-muted mb-1">Total Tagihan</label>
                                              <input type="text" id="total_tampil" class="form-control-plaintext fs-3 fw-bold text-danger p-0" readonly value="Rp 0">
                                              <input type="hidden" id="total_harga" value="0">
                                              <input type="hidden" id="total_jumlah" value="0">
                                          </div>
                                          
                                          <button type="submit" class="btn btn-primary w-100" id="btn-proses"><i class="bi bi-check2-circle me-2"></i>Checkout Pesanan</button>
                                      </form>
                                  </div>
                              </div>
                          </div>
                          
                          <div class="col-lg-8">
                              <div class="card h-100">
                                  <div class="card-header py-3 d-flex justify-content-between align-items-center">
                                      <h5 class="mb-0 text-dark fw-bold"><i class="bi bi-clock-history me-2"></i>Riwayat Transaksi</h5>
                                      <button class="btn btn-sm btn-outline-secondary" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                                  </div>
                                  <div class="card-body p-0">
                                      <div class="table-responsive">
                                          <table class="table table-hover align-middle mb-0">
                                              <thead class="table-light">
                                                  <tr>
                                                      <th class="px-4 py-3">Waktu</th>
                                                      <th class="py-3">Pelanggan</th>
                                                      <th class="py-3" style="max-width: 250px;">Detail Pesanan</th>
                                                      <th class="py-3 text-center">Jml Item</th>
                                                      <th class="px-4 py-3 text-end">Total</th>
                                                  </tr>
                                              </thead>
                                              <tbody id="tabelPesanan">
                                                  <tr><td colspan="5" class="text-center py-4 text-muted">Memuat data...</td></tr>
                                              </tbody>
                                          </table>
                                      </div>
                                  </div>
                              </div>
                          </div>
                      </div>
                  </div>
                  
                  <script>
                      const API_URL = 'http://192.168.56.20:5000/api/pesanan';
                      let keranjang = [];

                      // Jam Realtime
                      setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);

                      function tambahKeKeranjang() {
                          let menuEl = document.getElementById('menu');
                          if (menuEl.selectedIndex === 0) return alert("Silakan pilih menu terlebih dahulu!");
                          
                          let namaMenu = menuEl.options[menuEl.selectedIndex].text.split(' (')[0];
                          let harga = parseInt(menuEl.options[menuEl.selectedIndex].dataset.harga);
                          let qty = parseInt(document.getElementById('jumlah').value);
                          
                          if (qty < 1) return alert("Jumlah minimal 1 porsi!");

                          // Cek apakah menu sudah ada di keranjang
                          let indexExist = keranjang.findIndex(item => item.menu === namaMenu);
                          if(indexExist !== -1) {
                              keranjang[indexExist].qty += qty;
                          } else {
                              keranjang.push({ menu: namaMenu, harga: harga, qty: qty });
                          }
                          
                          updateKeranjangUI();
                          document.getElementById('menu').selectedIndex = 0;
                          document.getElementById('jumlah').value = 1;
                      }

                      function updateKeranjangUI() {
                          let html = '<ul class="list-group list-group-flush border rounded-3">';
                          let totalHrg = 0, totalItem = 0;

                          keranjang.forEach((item, index) => {
                              let subtotal = item.harga * item.qty;
                              totalHrg += subtotal;
                              totalItem += item.qty;
                              html += `
                              <li class="list-group-item keranjang-item d-flex justify-content-between align-items-center bg-white py-2">
                                  <div><span class="fw-bold">${item.menu}</span> <small class="text-muted">x${item.qty}</small></div>
                                  <div>
                                      <span class="me-2 text-dark">Rp ${subtotal.toLocaleString('id-ID')}</span>
                                      <button type="button" class="btn btn-sm text-danger p-0 m-0" onclick="hapusItem(${index})"><i class="bi bi-x-circle-fill"></i></button>
                                  </div>
                              </li>`;
                          });
                          html += '</ul>';
                          
                          document.getElementById('keranjang-area').innerHTML = keranjang.length > 0 ? html : '';
                          document.getElementById('total_harga').value = totalHrg;
                          document.getElementById('total_jumlah').value = totalItem;
                          document.getElementById('total_tampil').value = 'Rp ' + totalHrg.toLocaleString('id-ID');
                      }

                      function hapusItem(index) {
                          keranjang.splice(index, 1);
                          updateKeranjangUI();
                      }

                      async function loadData() {
                          try {
                              let res = await fetch(API_URL);
                              let data = await res.json();
                              let tb = document.getElementById('tabelPesanan'); 
                              tb.innerHTML = '';
                              
                              if(data.length === 0) {
                                  tb.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted"><i class="bi bi-inbox fs-4 d-block mb-2"></i>Belum ada transaksi</td></tr>';
                                  return;
                              }

                              data.forEach(i => {
                                  tb.innerHTML += `
                                  <tr>
                                      <td class="px-4"><small class="text-muted"><i class="bi bi-calendar2-event me-1"></i>${i.waktu}</small></td>
                                      <td class="fw-bold text-dark">${i.nama_pelanggan}</td>
                                      <td><small>${i.menu}</small></td>
                                      <td class="text-center"><span class="badge bg-secondary rounded-pill">${i.jumlah}</span></td>
                                      <td class="px-4 text-end text-success fw-bold">Rp ${parseFloat(i.total_harga).toLocaleString('id-ID')}</td>
                                  </tr>`;
                              });
                          } catch(err) {
                              document.getElementById('tabelPesanan').innerHTML = '<tr><td colspan="5" class="text-center py-4 text-danger">Gagal memuat data. Pastikan Backend menyala.</td></tr>';
                          }
                      }

                      document.getElementById('formKasir').onsubmit = async (e) => {
                          e.preventDefault();
                          if(keranjang.length === 0) return alert("Keranjang kosong! Tambahkan menu terlebih dahulu.");
                          
                          let btn = document.getElementById('btn-proses');
                          btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Memproses...';
                          btn.disabled = true;

                          // Gabungkan nama menu dari array keranjang menjadi 1 string
                          let gabunganMenu = keranjang.map(i => `${i.menu} (x${i.qty})`).join(', ');

                          try {
                              await fetch(API_URL, {
                                  method: 'POST', headers: {'Content-Type': 'application/json'},
                                  body: JSON.stringify({
                                      nama_pelanggan: document.getElementById('pelanggan').value,
                                      menu: gabunganMenu,
                                      jumlah: document.getElementById('total_jumlah').value,
                                      total_harga: document.getElementById('total_harga').value
                                  })
                              });
                              document.getElementById('formKasir').reset(); 
                              keranjang = [];
                              updateKeranjangUI();
                              await loadData();
                          } catch(err) {
                              alert('Gagal memproses pesanan!');
                          } finally {
                              btn.innerHTML = '<i class="bi bi-check2-circle me-2"></i>Checkout Pesanan';
                              btn.disabled = false;
                          }
                      };
                      
                      loadData();
                  </script>
              </body>
              </html>
      when: target_node == 'frontend'